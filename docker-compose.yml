version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: wasel_db
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: wasel_palestine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wasel_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://user_admin:password123@db:5432/wasel_palestine
      JWT_SECRET: your_super_secret_key
    depends_on:
      - db

