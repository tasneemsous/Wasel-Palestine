version: "3.9"

services:
  db:
    image: postgres:16
    container_name: wasel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wasel_user
      POSTGRES_PASSWORD: wasel_password
      POSTGRES_DB: wasel_db
      PGPORT: "5433"
    ports:
      - "5433:5433"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

volumes:
  db_data: